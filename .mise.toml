[tools]
node = "22"
pnpm = "10"

[tasks.install]
description = "Install dependencies"
run = "pnpm install"

[tasks.dev]
description = "Run library and example in dev mode"
run = "pnpm dev"

[tasks.lint]
description = "Run lint for all workspaces"
run = "pnpm lint"

[tasks.test]
description = "Run library tests"
run = "pnpm test"

[tasks.build]
description = "Build library"
run = "pnpm build"

[tasks.release]
description = "Publish with changesets"
run = "pnpm release"
