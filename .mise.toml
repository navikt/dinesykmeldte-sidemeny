[tools]
node = "24"
pnpm = "10"

[tasks.install]
description = "Install dependencies (cached)"
run = "pnpm install"
sources = ["package.json", "pnpm-lock.yaml"]
outputs = ["node_modules/.modules.yaml"]

[tasks.dev]
description = "Run library and example in dev mode"
depends = ["install"]
run = "pnpm dev"

[tasks.lint]
description = "Run linter with fixing enabled"
depends = ["install"]
run = "pnpm run lint:fix"

[tasks.format]
description = "Run formatter with fixing enabled"
depends = ["install"]
run = "pnpm run format:fix"

[tasks.check]
description = "Run type checker with fixing enabled"
depends = ["install"]
run = "pnpm run check:fix"

[tasks.test]
description = "Run library tests"
depends = ["install"]
run = "pnpm run test"

[tasks.build]
description = "Build library"
depends = ["install"]
run = "pnpm run build"

[tasks.verify]
description = "Verify code quality, run tests and build"
depends = ["install"]
run = "mise run check && mise run test --no-watch && mise run build"
