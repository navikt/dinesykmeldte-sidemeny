[tools]
node = "24"
pnpm = "10"

[tasks.install]
description = "Install dependencies (cached)"
run = "pnpm install"
sources = ["package.json", "pnpm-lock.yaml"]
outputs = ["node_modules/.modules.yaml"]

[tasks.dev]
description = "Run library and example in dev mode"
depends = ["install"]
run = "pnpm dev"

[tasks.lint]
description = "Run lint for all workspaces"
depends = ["install"]
run = "pnpm lint"

[tasks.test]
description = "Run library tests"
depends = ["install"]
run = "pnpm test"

[tasks.build]
description = "Build library"
depends = ["install"]
run = "pnpm build"


[tasks.ci]
description = "Full CI pipeline: lint, test and build"
depends = ["lint","test","build"]
